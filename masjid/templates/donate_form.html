<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donate to {{ tabung.name }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      color: #007bff;
    }
    .tabung-info {
      margin-bottom: 30px;
    }
    .tabung-info img {
      max-width: 100%;
      height: auto;
      margin-top: 10px;
    }
    label {
      font-weight: bold;
    }
    input[type="text"],
    input[type="number"],
    input[type="file"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #28a745;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #218838;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #007bff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Donate to: {{ tabung.name }}</h2>

    <div class="tabung-info">
      <p><strong>Description:</strong> {{ tabung.description }}</p>
      <p><strong>Bank Account:</strong> {{ tabung.bank_account }}</p>
      {% if tabung.qr_code %}
        <p><strong>Scan QR Code:</strong></p>
        <img src="{{ tabung.qr_code.url }}" alt="QR Code">
      {% endif %}
      <p><strong>Total Collected:</strong> RM {{ tabung.total_collected|floatformat:2 }}</p>
    </div>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <label for="donor_name">Your Name:</label>
      <input type="text" id="donor_name" name="donor_name" required>

      <label for="phone_number">Phone Number:</label>
      <input type="text" id="phone_number" name="phone_number" required>

      <label for="amount">Donation Amount (RM):</label>
      <input type="number" id="amount" name="amount" step="0.01" required>

      <label for="receipt">Upload Payment Proof (Receipt):</label>
      <input type="file" id="receipt" name="receipt_image" accept="image/*" required>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <!-- input fields here -->
         <button type="submit">Submit Donation</button>
        </form>

    </form>

    <a href="{% url 'home' %}" class="back-link">← Back to Homepage</a>
  </div>

  
</body>
</html>
