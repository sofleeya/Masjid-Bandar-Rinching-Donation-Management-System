<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AJK Dashboard</title>
  <style>
    body { font-family: Arial; background-color: #f9f9f9; margin: 0; padding: 0; }
    header, footer { background-color: #343a40; color: white; padding: 15px; text-align: center; }
    .container { padding: 30px; }
    .card { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
    a.button, button.button { display: inline-block; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; text-decoration: none; cursor: pointer; }
    a.button:hover, button.button:hover { background: #0056b3; }
    form.logout-form { text-align: center; margin-top: 20px; }
  </style>
</head>
<body>

<header>
  <h1>Welcome, AJK Masjid</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Submit New Disbursement</h2>
    <a href="{% url 'submit_disbursement' %}" class="button">Request Disbursement</a>
  </div>

  <div class="card">
    <h2>View My Disbursement Requests</h2>
    <a href="{% url 'view_disbursements' %}" class="button">My Requests</a>

  </div>

  <div class="card">
    <h2>Update Profile</h2>
    <a href="{% url 'ajk_profile' %}" class="button">Edit My Info</a>
  </div>

  <div class="card">
  <h2>View Donation Summary</h2>
  <a href="{% url 'ajk_donation_summary' %}" class="button">Summary</a>
</div>


</div>

<footer>
  <p>&copy; 2025 Masjid Donation System</p>
  <form method="POST" action="{% url 'logout' %}" class="logout-form">
    {% csrf_token %}
    <button type="submit" class="button" style="background-color: #dc3545;">Logout</button>
  </form>
</footer>

</body>
</html>
