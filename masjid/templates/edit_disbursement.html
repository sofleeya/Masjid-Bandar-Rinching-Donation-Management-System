<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Disbursement</title>
  <style>
    body { font-family: Arial; padding: 30px; background-color: #f9f9f9; }
    form { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; }
    button { margin-top: 20px; padding: 10px 20px; background: green; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Edit Disbursement Request</h2>

  <form method="POST">
    {% csrf_token %}

    <!-- Change Tabung -->
    <label for="donation_type">Select Tabung</label>
    <select name="donation_type" required>
      {% for tabung in tabung_list %}
        <option value="{{ tabung.id }}" {% if disbursement.donation_type.id == tabung.id %}selected{% endif %}>
          {{ tabung.name }}
        </option>
      {% endfor %}
    </select>

    <!-- Amount -->
    <label for="amount">Amount (RM)</label>
    <input type="number" name="amount" value="{{ disbursement.amount }}" required>

    <!-- Purpose -->
    <label for="purpose">Purpose</label>
    <textarea name="purpose" required>{{ disbursement.purpose }}</textarea>

    <button type="submit">Update</button>
  </form>
</body>
</html>
